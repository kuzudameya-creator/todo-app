<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .app {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 14px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    li.completed span {
      text-decoration: line-through;
      color: #aaa;
    }

    .actions button {
      margin-left: 5px;
      background: #e5e7eb;
      color: #333;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>TODO</h1>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="タスクを入力">
    <button onclick="addTask()">追加</button>
  </div>

  <ul id="todoList"></ul>
</div>

<script>
let todos = JSON.parse(localStorage.getItem('todos')) || [];

function saveTodos() {
  localStorage.setItem('todos', JSON.stringify(todos));
}

function render() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';

  todos.forEach((todo, index) => {
    const li = document.createElement('li');
    li.className = todo.completed ? 'completed' : '';

    li.innerHTML = `
      <span>${todo.text}</span>
      <div class="actions">
        <button onclick="toggle(${index})">✔</button>
        <button onclick="removeTask(${index})">削除</button>
      </div>
    `;

    list.appendChild(li);
  });
}

function addTask() {
  const input = document.getElementById('taskInput');
  if (!input.value) return;

  todos.push({ text: input.value, completed: false });
  input.value = '';
  saveTodos();
  render();
}

function toggle(index) {
  todos[index].completed = !todos[index].completed;
  saveTodos();
  render();
}

function removeTask(index) {
  todos.splice(index, 1);
  saveTodos();
  render();
}

render();
</script>

</body>
</html>
